# CI/CD Pipeline for Rakez ERP
name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, curl, zip, pdo, mysql
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Remove stale Laravel package discovery cache (avoids loading dev-only Pail)
        run: rm -f bootstrap/cache/packages.php bootstrap/cache/services.php

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /var/www/Rakez/rakez-erp

            # Update code
            git fetch origin
            git reset --hard origin/main

            # Remove discovery cache BEFORE composer so post-autoload-dump doesn't load Pail
            rm -f bootstrap/cache/packages.php bootstrap/cache/services.php

            # Composer (package:discover will run with no cache = rebuild without dev providers)
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            # NPM and build
            npm ci
            npm run build

            # Laravel caches (single optimize instead of four separate commands)
            php artisan optimize

            # Migrations
            php artisan migrate --force

            # Queue
            php artisan queue:restart

            echo "Deployment completed successfully!"

